name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - powerline-context/**
      - .github/workflows/publish.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: pkg
        run: |
          node -e "const p=require('./package.json'); console.log('name=' + p.name); console.log('version=' + p.version);" >> "$GITHUB_OUTPUT"

      - name: Read published version (if any)
        id: published
        run: |
          PUBLISHED=$(npm view "${{ steps.pkg.outputs.name }}" version 2>/dev/null || echo "none")
          echo "version=$PUBLISHED" >> "$GITHUB_OUTPUT"

      - name: Ensure NPM_TOKEN is set
        if: steps.pkg.outputs.version != steps.published.outputs.version
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not configured in GitHub Actions secrets."
            echo "Add it at: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi

      - name: Publish if version is new
        if: steps.pkg.outputs.version != steps.published.outputs.version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Skip publish (version unchanged)
        if: steps.pkg.outputs.version == steps.published.outputs.version
        run: echo "Version ${{ steps.pkg.outputs.version }} already published; skipping."
