name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - powerline-context/**
      - .github/workflows/publish.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: pkg
        run: |
          node -e "const p=require('./package.json'); console.log('name=' + p.name); console.log('version=' + p.version);" >> "$GITHUB_OUTPUT"

      - name: Read published version (if any)
        id: published
        run: |
          PUBLISHED=$(npm view "${{ steps.pkg.outputs.name }}" version 2>/dev/null || echo "none")
          echo "version=$PUBLISHED" >> "$GITHUB_OUTPUT"

      - name: Publish if version is new
        if: steps.pkg.outputs.version != steps.published.outputs.version
        run: npm publish --access public --provenance

      - name: Skip publish (version unchanged)
        if: steps.pkg.outputs.version == steps.published.outputs.version
        run: echo "Version ${{ steps.pkg.outputs.version }} already published; skipping."
